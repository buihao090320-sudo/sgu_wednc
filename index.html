<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Văn Phòng Phẩm Sài Gòn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="top-bar">
        <div class="container">
            <div class="logo">
                <img src="images/logo.png" alt="VPP Sài Gòn">
            </div>
            
            <div class="search-box">
                <input type="text" placeholder="Tìm kiếm sản phẩm...">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="header-info">
                <div class="hotline">
                    <i class="fa-solid fa-phone"></i>
                    <div>
                        <strong>0847 038 310</strong>
                        <span>Hỗ trợ khách hàng</span>
                    </div>
                </div>
                
                <div class="user-account">
                    <i class="fa-regular fa-user"></i>
                    <div>
                        <strong>Đăng nhập</strong>
                        <span>Đăng ký</span>
                    </div>
                </div>

                <div class="cart">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-count">0</span>
                </div>
            </div>
        </div>
    </div>
    <nav class="main-nav">
        <ul class="container">
            <li><i class="fa-solid fa-pen"></i> Bút viết <i class="fa-solid fa-chevron-down"></i></li>
            <li><i class="fa-solid fa-file-lines"></i> Văn phòng phẩm <i class="fa-solid fa-chevron-down"></i></li>
            <li><i class="fa-solid fa-compass"></i> Dụng cụ học tập <i class="fa-solid fa-chevron-down"></i></li>
            <li><i class="fa-solid fa-palette"></i> Mỹ thuật <i class="fa-solid fa-chevron-down"></i></li>
            <li><i class="fa-solid fa-print"></i> Giấy in <i class="fa-solid fa-chevron-down"></i></li>
        </ul>
    </nav>
</header>
<div class="slideshow">
<img src="images/bg1.jpg" class="slide active">
<img src="images/bg2.jpg" class="slide">
<img src="images/bg3.jpg" class="slide">
</div>
<script src="script.js"></script>
</body>
</html>
